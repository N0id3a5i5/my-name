<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      CSP allows connections to all three AI providers + Google Fonts.
      CapacitorHttp handles the actual API calls natively on Android,
      so these directives are mainly for browser/web builds.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
        worker-src 'self' blob:;
        connect-src 'self'
          https://api.groq.com
          https://generativelanguage.googleapis.com
          https://integrate.api.nvidia.com
          https://fonts.googleapis.com
          https://fonts.gstatic.com;
        img-src 'self' data: blob:;
      " />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#010308" />
    <title>MCQ Exam Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
